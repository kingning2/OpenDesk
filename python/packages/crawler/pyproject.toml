[project]
name = "crawler"
version = "0.1.0"
requires-python = ">=3.13"
dependencies = [
  "contracts",
  "shared",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/crawler"]

[tool.uv.sources]
contracts = { workspace = true }
shared = { workspace = true }
