[alias]
lint = "clippy --workspace --all-targets -- -D warnings"
fmt-check = "fmt --all -- --check"

# openssl-sys vendored 在 MSVC 下带 PDB 引用但不附带 ossl_static.pdb，
# 链接时刷屏 LNK4099；忽略即可（不影响产物正确性）。macOS/Linux 无此问题。
[target.x86_64-pc-windows-msvc]
rustflags = ["-C", "link-arg=/IGNORE:4099"]

[target.i686-pc-windows-msvc]
rustflags = ["-C", "link-arg=/IGNORE:4099"]
