# Path fragment for /v1/crawler/job/status
# Rust runtime client only — React must not call this URL.

/v1/crawler/job/status:
  post:
    operationId: crawler_job_status
    summary: "crawler job status (Rust → Python)"
    tags: [crawler]
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../schema/v1/crawler/sidecar/job_status.request.schema.json'
    responses:
      "200":
        description: Success
        content:
          application/json:
            schema:
              $ref: '../../schema/v1/crawler/sidecar/job_status.response.schema.json'
      "500":
        description: Sidecar error
        content:
          application/json:
            schema:
              $ref: '../sidecar.v1.yaml#/components/schemas/SidecarError'
