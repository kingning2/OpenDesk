# Path fragment for /v1/crawler/job/logs
# Rust runtime client only — React must not call this URL.

/v1/crawler/job/logs:
  post:
    operationId: crawler_job_logs
    summary: "crawler job logs (Rust → Python)"
    tags: [crawler]
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../../schema/v1/crawler/sidecar/job_logs.request.schema.json'
    responses:
      "200":
        description: Success
        content:
          application/json:
            schema:
              $ref: '../../schema/v1/crawler/sidecar/job_logs.response.schema.json'
      "500":
        description: Sidecar error
        content:
          application/json:
            schema:
              $ref: '../sidecar.v1.yaml#/components/schemas/SidecarError'
