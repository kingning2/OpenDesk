openapi: 3.1.0
info:
  title: OpenDesk Sidecar API
  version: v1
  description: |
    Rust Application Core 调用 Python Runtime 的本机 HTTP API。
    仅供 Rust 访问；React 禁止直连。
    业务路径由 `contracts/openapi/sidecar.paths/` 下的片段扩展。

servers:
  - url: http://127.0.0.1:{port}
    description: Local sidecar (port assigned by Rust runtime)
    variables:
      port:
        default: "8787"

paths:
  /health:
    get:
      operationId: sidecarHealth
      summary: Sidecar health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /stats:
    get:
      operationId: sidecarStats
      summary: Runtime statistics
      responses:
        "200":
          description: Stats payload
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /tasks/active:
    get:
      operationId: sidecarActiveTasks
      summary: Active async tasks
      responses:
        "200":
          description: Task list
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /metrics:
    get:
      operationId: sidecarMetrics
      summary: Prometheus-style metrics (skeleton)
      responses:
        "200":
          description: Metrics text
          content:
            text/plain:
              schema:
                type: string

  /debug/dump:
    get:
      operationId: sidecarDebugDump
      summary: Debug snapshot for Rust logging
      responses:
        "200":
          description: Debug dump
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

components:
  schemas:
    HealthResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ok]
      additionalProperties: false

    SidecarError:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string
        trace_id:
          type: string
      additionalProperties: false
