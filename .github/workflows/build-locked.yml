name: Build Locked Desktop

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows-x64-locked:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        run: pip install uv

      - name: Install Perl (vendored OpenSSL)
        shell: pwsh
        run: |
          choco install strawberryperl -y --no-progress
          "C:\Strawberry\perl\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "C:\Strawberry\c\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          perl -v

      - name: Build locked Windows x64 bundle
        run: node tooling/scripts/tauri-build-locked.mjs --target x86_64-pc-windows-msvc

      - name: Verify bundled license-verifier
        shell: pwsh
        run: |
          $names = @(
            "license-verifier-x86_64-pc-windows-msvc.exe",
            "license-verifier.exe"
          )
          $roots = @(
            "target/x86_64-pc-windows-msvc/release/bundle",
            "apps/desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle",
            "target/release/bundle"
          )
          $bundleDir = $roots | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $bundleDir) {
            Write-Error "Bundle directory not found"
            exit 1
          }
          $found = $false
          foreach ($name in $names) {
            $hits = Get-ChildItem -Path $bundleDir -Recurse -File -Filter $name -ErrorAction SilentlyContinue
            if ($hits.Count -gt 0) {
              $found = $true
              Write-Host "Found verifier in bundle: $($hits[0].FullName)"
              break
            }
          }
          if (-not $found) {
            Write-Error "license-verifier not found under $bundleDir"
            exit 1
          }

      - uses: actions/upload-artifact@v4
        with:
          name: windows-x64-locked-build-log
          path: |
            apps/desktop/src-tauri/binaries/license-verifier-x86_64-pc-windows-msvc.exe
            crates/adapter/generated/license_verifier.sha256
          if-no-files-found: error
