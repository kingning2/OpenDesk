      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          architecture: x86

      - name: Install uv
        run: pip install uv

      - name: Install Perl (vendored OpenSSL)
