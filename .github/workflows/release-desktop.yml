      - name: Package macOS Apple Silicon artifacts
        id: package
        run: |
          TAG="${{ github.ref_name }}"
          BASE_NAME="opendesk-${TAG}-macos-apple-silicon"
          BUNDLE_DIR=""
          for candidate in \
            "target/aarch64-apple-darwin/release/bundle" \
            "apps/desktop/src-tauri/target/aarch64-apple-darwin/release/bundle" \
            "target/release/bundle"
          do
            if [ -d "$candidate" ]; then
              BUNDLE_DIR="$candidate"
              break
            fi
          done
          if [ -z "$BUNDLE_DIR" ]; then
            echo "Bundle directory not found." >&2
            exit 1
          fi
          mkdir -p dist

          INSTALLER_PATH=""
          for pattern in "*.dmg" "*.pkg"; do
            MATCH="$(find "$BUNDLE_DIR" -type f -name "$pattern" | head -n 1)"
            if [ -n "$MATCH" ]; then
