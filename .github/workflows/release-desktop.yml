            exit 1
          fi

          APP_DIR="$(find "$BUNDLE_DIR" -type d -name "*.app" | head -n 1)"
          ZIP_PATH="dist/${BASE_NAME}.zip"
          if [ -n "$APP_DIR" ]; then
            ditto -c -k --sequesterRsrc --keepParent "$APP_DIR" "$ZIP_PATH"
          else
            echo "No .app found under $BUNDLE_DIR; cannot build zip." >&2
            exit 1
          fi

          echo "installer=$INSTALLER_PATH" >> "$GITHUB_OUTPUT"
          echo "zip=$ZIP_PATH" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-apple-silicon
          path: |
            ${{ steps.package.outputs.installer }}
            ${{ steps.package.outputs.zip }}

      - name: Upload macOS Apple Silicon assets to release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release upload "$TAG" "${{ steps.package.outputs.installer }}" "${{ steps.package.outputs.zip }}" --repo "$GH_REPO" --clobber

  verify-release-assets:
    runs-on: ubuntu-latest
    needs:
      - create-release
      - build-windows-x64
      - build-windows-x86
      - build-macos-intel
      - build-macos-apple-silicon
    steps:
      - name: Verify expected assets exist on release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release view "$TAG" --repo "$GH_REPO" --json assets > release.json
          python - <<'PY'
          import json
          from pathlib import Path

          data = json.loads(Path("release.json").read_text(encoding="utf-8"))
          names = [asset["name"] for asset in data.get("assets", [])]
          required_variants = [
              "-windows-x64",
              "-windows-x86",
              "-macos-intel",
              "-macos-apple-silicon",
          ]
          installer_suffixes = (".msi", ".exe", ".dmg", ".pkg")

          missing = []
          for variant in required_variants:
              variant_names = [
                  name for name in names
                  if name.startswith("opendesk-") and variant in name
              ]
              has_installer = any(
                  name.endswith(installer_suffixes) for name in variant_names
              )
              has_zip = any(name.endswith(".zip") for name in variant_names)
              if not has_installer:
                  missing.append(f"{variant} installer")
              if not has_zip:
                  missing.append(f"{variant} zip")

          if missing:
              raise SystemExit(
                  f"Missing release assets for: {', '.join(missing)}. Current assets: {names}"
              )

          print("Verified release assets:", names)
          PY
