name: Release Desktop Bundles

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Ensure GitHub Release exists
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          GH_REPO: ${{ github.repository }}
        run: |
          if gh release view "$TAG" --repo "$GH_REPO" >/dev/null 2>&1; then
            echo "Release $TAG already exists."
          else
            gh release create "$TAG" \
              --repo "$GH_REPO" \
              --title "$TAG" \
              --notes "Automated desktop build artifacts for $TAG (license-lock; installer + zip per platform)"
          fi

  build-windows-x64:
    runs-on: windows-latest
    needs: create-release
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        run: pip install uv

      - name: Install Perl (vendored OpenSSL)
        shell: pwsh
        run: |
          choco install strawberryperl -y --no-progress
          "C:\Strawberry\perl\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "C:\Strawberry\c\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          perl -v

      - name: Build frozen sidecar
        run: node tooling/scripts/build-sidecar.mjs --target x86_64-pc-windows-msvc

      - name: Build locked Windows x64 bundle
        run: node tooling/scripts/tauri-build-locked.mjs --target x86_64-pc-windows-msvc

      - name: Package Windows x64 artifacts
        id: package
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $baseName = "opendesk-$tag-windows-x64"
          $triple = "x86_64-pc-windows-msvc"
          $bundleCandidates = @(
            "target/$triple/release/bundle",
            "apps/desktop/src-tauri/target/$triple/release/bundle",
            "target/release/bundle"
          )
          $releaseCandidates = @(
            "target/$triple/release",
            "apps/desktop/src-tauri/target/$triple/release",
            "target/release"
          )
          $bundleDir = $bundleCandidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          $releaseDir = $releaseCandidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $bundleDir) {
            Write-Error "Bundle directory not found. Checked: $($bundleCandidates -join ', ')"
            exit 1
          }
          if (-not $releaseDir) {
            Write-Error "Release directory not found. Checked: $($releaseCandidates -join ', ')"
            exit 1
          }

          New-Item -ItemType Directory -Force -Path dist | Out-Null

          $installerFiles = Get-ChildItem -Path $bundleDir -Recurse -File | Where-Object {
            $_.Extension -in @(".msi", ".exe")
          } | Sort-Object {
            if ($_.Extension -eq ".msi") { 0 } else { 1 }
          }
          if ($installerFiles.Count -eq 0) {
            Write-Error "No installer (.msi/.exe) found under $bundleDir"
            exit 1
          }
          $installerPath = "dist/$baseName$($installerFiles[0].Extension)"
          Copy-Item $installerFiles[0].FullName $installerPath -Force

          $portableDir = Join-Path $env:RUNNER_TEMP "$baseName-portable"
          if (Test-Path $portableDir) { Remove-Item $portableDir -Recurse -Force }
          New-Item -ItemType Directory -Force -Path $portableDir | Out-Null
          $mainExe = Join-Path $releaseDir "opendesk.exe"
          if (-not (Test-Path $mainExe)) {
            Write-Error "Main binary not found: $mainExe"
            exit 1
          }
          Copy-Item $mainExe $portableDir -Force
          Get-ChildItem -Path $releaseDir -File | Where-Object {
            $_.Name -match '^(sidecar|license-verifier)' -or $_.Extension -in @(".dll")
          } | ForEach-Object { Copy-Item $_.FullName $portableDir -Force }

          $zipPath = "dist/$baseName.zip"
          if (Test-Path $zipPath) { Remove-Item $zipPath -Force }
          Compress-Archive -Path "$portableDir\*" -DestinationPath $zipPath -Force

          "installer=$installerPath" >> $env:GITHUB_OUTPUT
          "zip=$zipPath" >> $env:GITHUB_OUTPUT

      - uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: |
            ${{ steps.package.outputs.installer }}
            ${{ steps.package.outputs.zip }}

      - name: Upload Windows x64 assets to release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release upload "$env:TAG" "${{ steps.package.outputs.installer }}" "${{ steps.package.outputs.zip }}" --repo "$env:GH_REPO" --clobber

