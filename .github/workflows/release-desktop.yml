            exit 1
          }
          Copy-Item $mainExe $portableDir -Force
          Get-ChildItem -Path $releaseDir -File | Where-Object {
            $_.Name -match '^(sidecar|license-verifier)' -or $_.Extension -in @(".dll")
          } | ForEach-Object { Copy-Item $_.FullName $portableDir -Force }

          $zipPath = "dist/$baseName.zip"
          if (Test-Path $zipPath) { Remove-Item $zipPath -Force }
          Compress-Archive -Path "$portableDir\*" -DestinationPath $zipPath -Force

          "installer=$installerPath" >> $env:GITHUB_OUTPUT
          "zip=$zipPath" >> $env:GITHUB_OUTPUT

      - uses: actions/upload-artifact@v4
        with:
          name: windows-x86
          path: |
            ${{ steps.package.outputs.installer }}
            ${{ steps.package.outputs.zip }}

      - name: Upload Windows x86 assets to release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release upload "$env:TAG" "${{ steps.package.outputs.installer }}" "${{ steps.package.outputs.zip }}" --repo "$env:GH_REPO" --clobber

  build-macos-intel:
    # macos-13 已下线；Intel x86_64 用 macos-15-intel，否则会永久排队。
    runs-on: macos-15-intel
    needs: create-release
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        run: pip install uv

      - name: Build frozen sidecar
        run: node tooling/scripts/build-sidecar.mjs --target x86_64-apple-darwin

      - name: Build locked macOS Intel bundle
        run: node tooling/scripts/tauri-build-locked.mjs --target x86_64-apple-darwin

      - name: Package macOS Intel artifacts
        id: package
        run: |
          TAG="${{ github.ref_name }}"
          BASE_NAME="opendesk-${TAG}-macos-intel"
          BUNDLE_DIR=""
          for candidate in \
            "target/x86_64-apple-darwin/release/bundle" \
            "apps/desktop/src-tauri/target/x86_64-apple-darwin/release/bundle" \
            "target/release/bundle"
          do
            if [ -d "$candidate" ]; then
              BUNDLE_DIR="$candidate"
              break
            fi
          done
          if [ -z "$BUNDLE_DIR" ]; then
            echo "Bundle directory not found." >&2
            exit 1
          fi
          mkdir -p dist

          INSTALLER_PATH=""
          for pattern in "*.dmg" "*.pkg"; do
            MATCH="$(find "$BUNDLE_DIR" -type f -name "$pattern" | head -n 1)"
            if [ -n "$MATCH" ]; then
              EXT="${MATCH##*.}"
              INSTALLER_PATH="dist/${BASE_NAME}.${EXT}"
              cp "$MATCH" "$INSTALLER_PATH"
              break
            fi
          done
          if [ -z "$INSTALLER_PATH" ]; then
            echo "No installer (.dmg/.pkg) found under $BUNDLE_DIR" >&2
            exit 1
          fi

          APP_DIR="$(find "$BUNDLE_DIR" -type d -name "*.app" | head -n 1)"
          ZIP_PATH="dist/${BASE_NAME}.zip"
          if [ -n "$APP_DIR" ]; then
            ditto -c -k --sequesterRsrc --keepParent "$APP_DIR" "$ZIP_PATH"
          else
            echo "No .app found under $BUNDLE_DIR; cannot build zip." >&2
            exit 1
          fi

          echo "installer=$INSTALLER_PATH" >> "$GITHUB_OUTPUT"
          echo "zip=$ZIP_PATH" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-intel
          path: |
            ${{ steps.package.outputs.installer }}
            ${{ steps.package.outputs.zip }}

      - name: Upload macOS Intel assets to release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release upload "$TAG" "${{ steps.package.outputs.installer }}" "${{ steps.package.outputs.zip }}" --repo "$GH_REPO" --clobber

