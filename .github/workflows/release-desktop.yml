name: Release Desktop Bundles

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Ensure GitHub Release exists
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          GH_REPO: ${{ github.repository }}
        run: |
          if gh release view "$TAG" --repo "$GH_REPO" >/dev/null 2>&1; then
            echo "Release $TAG already exists."
          else
            gh release create "$TAG" \
              --repo "$GH_REPO" \
              --title "$TAG" \
              --notes "Automated desktop build artifacts for $TAG"
          fi

  build-windows-x64:
    runs-on: windows-latest
    needs: create-release
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Windows x64 bundle
        run: pnpm tauri build --target x86_64-pc-windows-msvc

      - name: Package Windows x64 artifact
        id: package
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $baseName = "opendesk-$tag-windows-x64"
          $candidates = @(
            "target/x86_64-pc-windows-msvc/release/bundle",
            "apps/desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle",
            "target/release/bundle"
          )
          $bundleDir = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $bundleDir) {
            Write-Error "Bundle directory not found. Checked: $($candidates -join ', ')"
            exit 1
          }
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $preferredFiles = Get-ChildItem -Path $bundleDir -Recurse -File | Where-Object {
            $_.Extension -in @(".msi", ".exe")
          } | Sort-Object {
            if ($_.Extension -eq ".msi") { 0 } else { 1 }
          }

          if ($preferredFiles.Count -gt 0) {
            $source = $preferredFiles[0].FullName
            $assetPath = "dist/$baseName$($preferredFiles[0].Extension)"
            Copy-Item $source $assetPath -Force
          } else {
            $assetPath = "dist/$baseName.zip"
            Compress-Archive -Path "$bundleDir/*" -DestinationPath $assetPath -Force
          }

          "asset=$assetPath" >> $env:GITHUB_OUTPUT

      - uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: ${{ steps.package.outputs.asset }}

      - name: Upload Windows x64 asset to release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          GH_REPO: ${{ github.repository }}
        run: gh release upload "$env:TAG" "${{ steps.package.outputs.asset }}" --repo "$env:GH_REPO" --clobber

  build-windows-x86:
    runs-on: windows-latest
    needs: create-release
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: i686-pc-windows-msvc

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Windows x86 bundle
        run: pnpm tauri build --target i686-pc-windows-msvc

      - name: Package Windows x86 artifact
        id: package
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $baseName = "opendesk-$tag-windows-x86"
          $candidates = @(
            "target/i686-pc-windows-msvc/release/bundle",
            "apps/desktop/src-tauri/target/i686-pc-windows-msvc/release/bundle",
            "target/release/bundle"
          )
          $bundleDir = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $bundleDir) {
            Write-Error "Bundle directory not found. Checked: $($candidates -join ', ')"
            exit 1
          }
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $preferredFiles = Get-ChildItem -Path $bundleDir -Recurse -File | Where-Object {
            $_.Extension -in @(".msi", ".exe")
          } | Sort-Object {
            if ($_.Extension -eq ".msi") { 0 } else { 1 }
          }

          if ($preferredFiles.Count -gt 0) {
            $source = $preferredFiles[0].FullName
            $assetPath = "dist/$baseName$($preferredFiles[0].Extension)"
            Copy-Item $source $assetPath -Force
          } else {
            $assetPath = "dist/$baseName.zip"
            Compress-Archive -Path "$bundleDir/*" -DestinationPath $assetPath -Force
          }

          "asset=$assetPath" >> $env:GITHUB_OUTPUT

      - uses: actions/upload-artifact@v4
        with:
          name: windows-x86
          path: ${{ steps.package.outputs.asset }}

      - name: Upload Windows x86 asset to release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          GH_REPO: ${{ github.repository }}
        run: gh release upload "$env:TAG" "${{ steps.package.outputs.asset }}" --repo "$env:GH_REPO" --clobber

  build-macos-intel:
    runs-on: macos-13
    needs: create-release
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build macOS Intel bundle
        run: pnpm tauri build --target x86_64-apple-darwin

      - name: Package macOS Intel artifact
        id: package
        run: |
          TAG="${{ github.ref_name }}"
          BASE_NAME="opendesk-${TAG}-macos-intel"
          BUNDLE_DIR=""
          for candidate in \
            "target/x86_64-apple-darwin/release/bundle" \
            "apps/desktop/src-tauri/target/x86_64-apple-darwin/release/bundle" \
            "target/release/bundle"
          do
            if [ -d "$candidate" ]; then
              BUNDLE_DIR="$candidate"
              break
            fi
          done
          if [ -z "$BUNDLE_DIR" ]; then
            echo "Bundle directory not found." >&2
            exit 1
          fi
          mkdir -p dist
          ASSET_PATH=""
          for pattern in "*.dmg" "*.app.tar.gz" "*.pkg"; do
            MATCH="$(find "$BUNDLE_DIR" -type f -name "$pattern" | head -n 1)"
            if [ -n "$MATCH" ]; then
              EXT="${MATCH##*.}"
              case "$MATCH" in
                *.app.tar.gz) EXT="app.tar.gz" ;;
              esac
              ASSET_PATH="dist/${BASE_NAME}.${EXT}"
              cp "$MATCH" "$ASSET_PATH"
              break
            fi
          done

          if [ -z "$ASSET_PATH" ]; then
            APP_DIR="$(find "$BUNDLE_DIR" -type d -name "*.app" | head -n 1)"
            if [ -n "$APP_DIR" ]; then
              ASSET_PATH="dist/${BASE_NAME}.zip"
              ditto -c -k --sequesterRsrc --keepParent "$APP_DIR" "$ASSET_PATH"
            else
              ASSET_PATH="dist/${BASE_NAME}.zip"
              zip -r "$ASSET_PATH" "$BUNDLE_DIR"
            fi
          fi

          echo "asset=$ASSET_PATH" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-intel
          path: ${{ steps.package.outputs.asset }}

      - name: Upload macOS Intel asset to release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          GH_REPO: ${{ github.repository }}
        run: gh release upload "$TAG" "${{ steps.package.outputs.asset }}" --repo "$GH_REPO" --clobber

  build-macos-apple-silicon:
    runs-on: macos-14
    needs: create-release
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build macOS Apple Silicon bundle
        run: pnpm tauri build --target aarch64-apple-darwin

      - name: Package macOS Apple Silicon artifact
        id: package
        run: |
          TAG="${{ github.ref_name }}"
          BASE_NAME="opendesk-${TAG}-macos-apple-silicon"
          BUNDLE_DIR=""
          for candidate in \
            "target/aarch64-apple-darwin/release/bundle" \
            "apps/desktop/src-tauri/target/aarch64-apple-darwin/release/bundle" \
            "target/release/bundle"
          do
            if [ -d "$candidate" ]; then
              BUNDLE_DIR="$candidate"
              break
            fi
          done
          if [ -z "$BUNDLE_DIR" ]; then
            echo "Bundle directory not found." >&2
            exit 1
          fi
          mkdir -p dist
          ASSET_PATH=""
          for pattern in "*.dmg" "*.app.tar.gz" "*.pkg"; do
            MATCH="$(find "$BUNDLE_DIR" -type f -name "$pattern" | head -n 1)"
            if [ -n "$MATCH" ]; then
              EXT="${MATCH##*.}"
              case "$MATCH" in
                *.app.tar.gz) EXT="app.tar.gz" ;;
              esac
              ASSET_PATH="dist/${BASE_NAME}.${EXT}"
              cp "$MATCH" "$ASSET_PATH"
              break
            fi
          done

          if [ -z "$ASSET_PATH" ]; then
            APP_DIR="$(find "$BUNDLE_DIR" -type d -name "*.app" | head -n 1)"
            if [ -n "$APP_DIR" ]; then
              ASSET_PATH="dist/${BASE_NAME}.zip"
              ditto -c -k --sequesterRsrc --keepParent "$APP_DIR" "$ASSET_PATH"
            else
              ASSET_PATH="dist/${BASE_NAME}.zip"
              zip -r "$ASSET_PATH" "$BUNDLE_DIR"
            fi
          fi

          echo "asset=$ASSET_PATH" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-apple-silicon
          path: ${{ steps.package.outputs.asset }}

      - name: Upload macOS Apple Silicon asset to release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          GH_REPO: ${{ github.repository }}
        run: gh release upload "$TAG" "${{ steps.package.outputs.asset }}" --repo "$GH_REPO" --clobber

  verify-release-assets:
    runs-on: ubuntu-latest
    needs:
      - create-release
      - build-windows-x64
      - build-windows-x86
      - build-macos-intel
      - build-macos-apple-silicon
    steps:
      - name: Verify expected assets exist on release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release view "$TAG" --repo "$GH_REPO" --json assets > release.json
          python - <<'PY'
          import json
          from pathlib import Path

          data = json.loads(Path("release.json").read_text(encoding="utf-8"))
          names = [asset["name"] for asset in data.get("assets", [])]
          expected_prefixes = [
              "opendesk-v",
          ]
          required_variants = [
              "-windows-x64",
              "-windows-x86",
              "-macos-intel",
              "-macos-apple-silicon",
          ]

          missing = []
          for variant in required_variants:
              if not any(name.startswith("opendesk-") and variant in name for name in names):
                  missing.append(variant)

          if missing:
              raise SystemExit(
                  f"Missing release assets for: {', '.join(missing)}. Current assets: {names}"
              )

          print("Verified release assets:", names)
          PY
